<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya's Jungle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="bg-music" src="SOUNDS/jungle.mp3" loop></audio>

    <h1>Maya's Jungle</h1>
    <p class="subtitle">לחצו על החיות כדי לשמוע אותן</p>
    
    <div class="jungle-container">
        
        <div class="item" data-sound="duck-sound">
            <img src="PIC/duck.jpg" alt="ברווז">
            <audio id="duck-sound" src="SOUNDS/duck.mp3"></audio>
        </div>

        <div class="item" data-sound="cat-sound">
            <img src="PIC/cat.jpg" alt="חתול">
            <audio id="cat-sound" src="SOUNDS/cat.mp3"></audio>
        </div>

        <div class="item" data-sound="horse-sound">
            <img src="PIC/horse.jpg" alt="סוס">
            <audio id="horse-sound" src="SOUNDS/horse.mp3"></audio>
        </div>

        <div class="item" data-sound="dog-sound">
            <img src="PIC/dog.jpg" alt="כלב">
            <audio id="dog-sound" src="SOUNDS/dog.mp3"></audio>
        </div>

        <div class="item" data-sound="monkey-sound">
            <img src="PIC/monkey.jpg" alt="קוף">
            <audio id="monkey-sound" src="SOUNDS/monkey.mp3"></audio>
        </div>

        <div class="item" data-sound="cow-sound">
            <img src="PIC/cow.jpg" alt="פרה">
            <audio id="cow-sound" src="SOUNDS/cow.mp3"></audio>
        </div>

        <div class="item" data-sound="rooster-sound">
            <img src="PIC/rooster.jpg" alt="תרנגול">
            <audio id="rooster-sound" src="SOUNDS/rooster.mp3"></audio>
        </div>

    </div>

    <script src="main.js"></script>

</body>
</html>
